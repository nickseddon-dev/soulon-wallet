name: chaos

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Chaos iterations"
        required: false
        default: "2"
      trendWindow:
        description: "Trend window"
        required: false
        default: "5"
  schedule:
    - cron: "0 3 * * 1"
  push:
    paths:
      - "scripts/run-chaos-report.ps1"
      - "scripts/publish-alert-rules.ps1"
      - "scripts/run-rollback-drill.ps1"
      - "docker-compose.integration.yml"
      - "internal/indexer/**"
      - ".github/workflows/chaos.yml"

jobs:
  chaos-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run chaos report
        shell: pwsh
        run: ./scripts/run-chaos-report.ps1 -Iterations ${{ github.event.inputs.iterations || '2' }} -TrendWindow ${{ github.event.inputs.trendWindow || '5' }}
      - name: Validate suggestion artifacts
        if: always()
        shell: pwsh
        run: |
          $jsonReport = Get-ChildItem -Path reports/chaos -Filter "chaos-report-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $ruleFile = Get-ChildItem -Path reports/chaos -Filter "chaos-alert-rules-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $playbookFile = Get-ChildItem -Path reports/chaos -Filter "chaos-recovery-playbook-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $jsonReport) {
            throw "未找到 chaos-report JSON 文件"
          }
          if (-not $ruleFile) {
            throw "未找到 chaos-alert-rules 文件"
          }
          if (-not $playbookFile) {
            throw "未找到 chaos-recovery-playbook 文件"
          }
          $report = Get-Content -Path $jsonReport.FullName -Raw | ConvertFrom-Json
          $rules = Get-Content -Path $ruleFile.FullName -Raw | ConvertFrom-Json
          if (-not $rules.globalRules -or $rules.globalRules.Count -eq 0) {
            throw "globalRules 为空"
          }
          foreach ($rule in $rules.globalRules) {
            if (-not $rule.name -or -not $rule.severity -or $null -eq $rule.threshold) {
              throw "规则字段缺失: $($rule | ConvertTo-Json -Compress)"
            }
          }
          $errorPct = [double]$report.thresholdSuggestions.errorRate.recommendedPct
          $durationMs = [double]$report.thresholdSuggestions.duration.recommendedMs
          $consecutive = [double]$report.thresholdSuggestions.consecutiveFailures.recommendedCount
          if ($errorPct -lt 1 -or $errorPct -gt 100) {
            throw "recommendedErrorRatePct 越界: $errorPct"
          }
          if ($durationMs -lt 1000 -or $durationMs -gt 60000) {
            throw "recommendedAverageDurationMs 越界: $durationMs"
          }
          if ($consecutive -lt 1 -or $consecutive -gt 10) {
            throw "recommendedConsecutiveFailures 越界: $consecutive"
          }
      - name: Show threshold suggestions
        if: always()
        shell: pwsh
        run: |
          $jsonReport = Get-ChildItem -Path reports/chaos -Filter "chaos-report-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $ruleFile = Get-ChildItem -Path reports/chaos -Filter "chaos-alert-rules-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $playbookFile = Get-ChildItem -Path reports/chaos -Filter "chaos-recovery-playbook-*.json" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $jsonReport) {
            "## Chaos Threshold Suggestions`n`n- 未找到 JSON 报告文件。" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 0
          }
          $report = Get-Content -Path $jsonReport.FullName -Raw | ConvertFrom-Json
          $highRiskScenarios = @($report.scenarioSummary | Where-Object { $_.riskLevel -eq "high" } | ForEach-Object { $_.scenario })
          $summary = @()
          $summary += "## Chaos Threshold Suggestions"
          $summary += ""
          $summary += "- report: $($jsonReport.Name)"
          $summary += "- historySampleSize: $($report.thresholdSuggestions.sampleSize)"
          $summary += "- recommendedErrorRatePct: $($report.thresholdSuggestions.errorRate.recommendedPct)"
          $summary += "- recommendedAverageDurationMs: $($report.thresholdSuggestions.duration.recommendedMs)"
          $summary += "- recommendedConsecutiveFailures: $($report.thresholdSuggestions.consecutiveFailures.recommendedCount)"
          if ($highRiskScenarios.Count -gt 0) {
            $summary += "- highRiskScenarios: $($highRiskScenarios -join ', ')"
          } else {
            $summary += "- highRiskScenarios: none"
          }
          $summary += ""
          $summary += "建议基于上述阈值更新告警配置；若存在 highRiskScenarios，优先补充恢复策略。"
          if ($ruleFile) {
            $summary += "- alertRuleFile: $($ruleFile.Name)"
          }
          if ($playbookFile) {
            $summary += "- recoveryPlaybookFile: $($playbookFile.Name)"
          }
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          if ($highRiskScenarios.Count -gt 0) {
            Write-Output "::warning::High risk chaos scenarios detected: $($highRiskScenarios -join ', ')"
          }
      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-report
          path: reports/chaos/*
